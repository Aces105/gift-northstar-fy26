<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Buy Gifting North Star FY27 – Sarah's Journey</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    user-select: none;
  }

  /* ── Phone shell ── */
  .phone {
    width: 390px;
    height: 844px;
    border-radius: 50px;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.08),
      0 0 0 10px #1c1c1e,
      0 0 0 11px rgba(255,255,255,0.06),
      0 40px 80px rgba(0,0,0,0.7);
    background: #000;
  }

  /* ── Screens ── */
  .screen {
    position: absolute; inset: 0;
    display: none;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }
  .screen::-webkit-scrollbar { display: none; }
  .screen.active { display: block; }

  .screen img.frame-img {
    width: 390px;
    display: block;
  }

  /* ── Tap zones (invisible, on top of image) ── */
  .tap-zone {
    position: absolute;
    cursor: pointer;
  }

  /* ── Navigation arrows ── */
  .arrow {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: white;
    width: 44px; height: 44px;
    border-radius: 50%;
    font-size: 20px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
    transition: background 0.15s;
    z-index: 200;
  }
  .arrow:hover { background: rgba(255,255,255,0.18); }
  .arrow.left  { left:  calc(50% - 242px); }
  .arrow.right { right: calc(50% - 242px); }

  /* ── Dot indicator ── */
  .dots {
    position: fixed;
    bottom: 28px;
    display: flex;
    gap: 6px;
    align-items: center;
    z-index: 200;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    cursor: pointer;
    transition: all 0.2s;
  }
  .dot.active { background: #FFE200; width: 20px; border-radius: 3px; }

  /* ── Screen label ── */
  .label {
    position: fixed;
    top: 18px;
    color: rgba(255,255,255,0.35);
    font-size: 11px;
    letter-spacing: 1px;
    font-family: monospace;
    z-index: 200;
  }

  /* ── Section badge (shown between screens) ── */
  .section-badge {
    position: fixed;
    top: 18px;
    right: calc(50% - 195px - 8px);
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.5);
    font-size: 10px;
    letter-spacing: 0.5px;
    padding: 4px 10px;
    border-radius: 20px;
    z-index: 200;
    font-family: -apple-system, sans-serif;
  }
</style>
</head>
<body>

<span class="label" id="lbl">1 / 16</span>
<span class="section-badge" id="badge">Intro</span>

<button class="arrow left"  onclick="prev()">‹</button>
<button class="arrow right" onclick="next()">›</button>

<div class="phone" id="phone">

  <!-- Each screen: scrollable container with the exact Figma frame image -->

  <div class="screen active" id="s1">
    <img class="frame-img" src="images/s1_intro.png" alt="Intro Card">
  </div>

  <div class="screen" id="s2">
    <img class="frame-img" src="images/s2_chatgpt_default.png" alt="ChatGPT Default">
  </div>

  <div class="screen" id="s3">
    <img class="frame-img" src="images/s3_chatgpt_mom.png" alt="ChatGPT Mom Typing">
  </div>

  <div class="screen" id="s4">
    <img class="frame-img" src="images/s4_chatgpt_ebike.png" alt="ChatGPT E-bike Results">
  </div>

  <div class="screen" id="s5">
    <img class="frame-img" src="images/s5_saved_mom.png" alt="BB Saved Items Mom">
  </div>

  <div class="screen" id="s6">
    <img class="frame-img" src="images/s6_askblue_mom.png" alt="Ask Blue Still Shopping Mom">
  </div>

  <div class="screen" id="s7">
    <img class="frame-img" src="images/s7_askblue_dad_typing.png" alt="Ask Blue Dad Typing">
  </div>

  <div class="screen" id="s8">
    <img class="frame-img" src="images/s8_askblue_dad_results.png" alt="Ask Blue Dad Results">
  </div>

  <div class="screen" id="s9">
    <img class="frame-img" src="images/s9_askblue_dad_toast.png" alt="Ask Blue Dad Item Saved">
  </div>

  <div class="screen" id="s10">
    <img class="frame-img" src="images/s10_bb_home.png" alt="Best Buy Home">
  </div>

  <div class="screen" id="s11">
    <img class="frame-img" src="images/s11_askblue_hi.png" alt="Ask Blue Hi Sarah">
  </div>

  <div class="screen" id="s12">
    <img class="frame-img" src="images/s12_askblue_sister_typing.png" alt="Ask Blue Sister Typing">
  </div>

  <div class="screen" id="s13">
    <img class="frame-img" src="images/s13_askblue_sister_results.png" alt="Ask Blue Sister Results">
  </div>

  <div class="screen" id="s14">
    <img class="frame-img" src="images/s14_sms.png" alt="SMS Price Drop Alert">
  </div>

  <div class="screen" id="s15">
    <img class="frame-img" src="images/s15_saved_all.png" alt="BB Saved Items All Tagged">
  </div>

  <div class="screen" id="s16">
    <img class="frame-img" src="images/s16_cart.png" alt="BB Cart Checkout">
  </div>

</div><!-- /phone -->

<div class="dots" id="dots"></div>

<script>
  const TOTAL = 16;
  const SECTIONS = {
    1: 'Intro',
    2: 'Mom · ChatGPT',
    3: 'Mom · ChatGPT',
    4: 'Mom · ChatGPT',
    5: 'Mom · Saved Items',
    6: 'Dad · Ask Blue',
    7: 'Dad · Ask Blue',
    8: 'Dad · Ask Blue',
    9: 'Dad · Ask Blue',
    10: 'Best Buy Home',
    11: 'Sister · Ask Blue',
    12: 'Sister · Ask Blue',
    13: 'Sister · Ask Blue',
    14: 'Checkout · SMS',
    15: 'Checkout · Saved',
    16: 'Checkout · Cart',
  };

  let cur = 1;

  function buildDots() {
    const bar = document.getElementById('dots');
    bar.innerHTML = '';
    for (let i = 1; i <= TOTAL; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i === cur ? ' active' : '');
      d.onclick = () => go(i);
      bar.appendChild(d);
    }
  }

  function go(n) {
    if (n < 1 || n > TOTAL) return;
    document.getElementById('s' + cur).classList.remove('active');
    cur = n;
    const el = document.getElementById('s' + cur);
    el.classList.add('active');
    el.scrollTop = 0;
    document.getElementById('lbl').textContent = cur + ' / ' + TOTAL;
    document.getElementById('badge').textContent = SECTIONS[cur];
    buildDots();
  }

  function next() { go(cur + 1); }
  function prev() { go(cur - 1); }

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') next();
    if (e.key === 'ArrowLeft')  prev();
  });

  // Swipe support
  let startX = 0;
  const phone = document.getElementById('phone');
  phone.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
  phone.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    if (Math.abs(dx) > 40) dx < 0 ? next() : prev();
  });

  buildDots();
</script>
</body>
</html>
